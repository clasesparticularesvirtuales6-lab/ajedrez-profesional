<head>
<meta charset="UTF-8">
<title>Ajedrez Profesional Ultimate</title>
<link rel="stylesheet" href="https://unpkg.com/chessground@8.0.0/dist/chessground.min.css">

<style>
body { background:#222; color:white; font-family:Arial,sans-serif; text-align:center; }
#login,#registro,#game{display:none; padding:20px; border-radius:10px; margin:20px auto; max-width:550px;}
#login{background:#333;}
#registro{background:#444;}
#game{background:#555;}
button{padding:10px 20px; margin:10px; cursor:pointer; border:none; border-radius:5px;}
input{padding:8px; margin:5px; width:200px;}
#board{width:500px;height:500px;margin:auto;}
#ranking{margin-top:10px; text-align:left; display:inline-block; max-width:500px;}
</style>
</head>
<body>

<h1>Ajedrez Profesional Ultimate</h1>

<div id="login">
<h2>Login</h2>
<input id="loginUser" placeholder="Correo electrónico"><br>
<input id="loginPass" type="password" placeholder="Contraseña"><br>
<button onclick="login()">Entrar</button>
<button onclick="showRegistro()">Registrarme</button>
<p id="msgLogin"></p>
</div>

<div id="registro">
<h2>Registro</h2>
<input id="regUser" placeholder="Correo electrónico"><br>
<input id="regPass" type="password" placeholder="Contraseña"><br>
<button onclick="registrar()">Registrar</button>
<button onclick="showLogin()">Volver</button>
<p id="msgReg"></p>
</div>

<div id="game">
<p>Sesión: <span id="currentPlayer"></span></p>
<div id="board"></div>
<p id="status">Estado del juego: en curso</p>
<p id="turno">Turno: Blancas</p>
<p id="movimientos">Movs: 0</p>
<button onclick="reiniciarPartida()">Reiniciar Partida</button><br>
<button onclick="salir()">Cerrar Sesión</button>
<h3>RANKING GLOBAL</h3>
<div id="ranking"></div>
</div>

  function showRegistro(){ document.getElementById("login").style.display="none"; document.getElementById("registro").style.display="block"; }
  function showGame(){ document.getElementById("login").style.display="none"; document.getElementById("registro").style.display="none"; document.getElementById("game").style.display="block"; }

  // --- REGISTRO ---
  async function registrar(){
    let u = document.getElementById("regUser").value;
    let p = document.getElementById("regPass").value;
    try{
      const userCredential = await auth.createUserWithEmailAndPassword(u,p);
      const userId = userCredential.user.uid; // Obtén el UID del usuario
      // Usa el UID como ID del documento y guarda el email también para el ranking
      await db.collection("usuarios").doc(userId).set({email: u, victorias:0,derrotas:0,empates:0,ranking:0});
      alert("Usuario registrado. Ahora podés hacer login.");

      // if (analytics) analytics.logEvent('sign_up', { method: 'email_password' });
      showLogin();
    }catch(e){
      alert("Error: " + e.message);
    }
  }

  // --- LOGIN ---
  async function login(){
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;
    try{
      const userCredential = await auth.signInWithEmailAndPassword(u,p);
      player = userCredential.user.uid; // Almacena el UID del usuario en 'player'
      document.getElementById("currentPlayer").innerText = userCredential.user.email; // Muestra el email
      // DESCOMENTA LA SIGUIENTE LÍNEA SI USAS FIREBASE ANALYTICS
      // if (analytics) analytics.logEvent('login', { method: 'email_password' });
      showGame();
      cargarRanking();
      setTimeout(initChess, 200); // espera que el div #board se renderice
    }catch(e){
      alert("Error: " + e.message);
    }
  }

  // --- CARGAR RANKING ---
  async function cargarRanking(){
    const querySnapshot = await db.collection("usuarios").get();
    let html="<ul>";
    let arr = [];
    querySnapshot.forEach(doc => {
      let data = doc.data();
      // Usamos el campo 'email' del documento para mostrar el usuario en el ranking
      arr.push({usuario: data.email, victorias:data.victorias, derrotas:data.derrotas, empates:data.empates, ranking:data.ranking});
    });
    arr.sort((a,b)=>b.victorias - a.victorias);
    arr.forEach(u=> html += `<li>${u.usuario} 🏆 V:${u.victorias} D:${u.derrotas} E:${u.empates} R:${u.ranking}</li>`);
    html += "</ul>";
    document.getElementById("ranking").innerHTML = html;
  }
