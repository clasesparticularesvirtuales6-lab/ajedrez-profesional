<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ajedrez Profesional Funcional</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/chessground@8.0.0/dist/chessground.min.css">
<style>
body { background-color:#222; color:white; font-family:Arial,sans-serif; text-align:center; margin:0; padding:0;}
h1 { margin-top:20px;}
#board { width: 500px; height: 500px; margin: 20px auto; }
button { padding:10px 20px; font-size:16px; cursor:pointer; border:none; border-radius:5px; background-color:#555; color:white; margin-top:10px; }
button:hover { background-color:#777; }
#info { margin-top:15px; }
#status, #turno, #movimientos { margin:5px 0; font-weight:bold; }
</style>
</head>
<body>

<h1>Ajedrez Profesional Funcional</h1>
<div id="board"></div>
<div id="info">
  <p id="status">Estado del juego: en curso</p>
  <p id="turno">Turno: Blancas</p>
  <p id="movimientos">Movimientos: 0</p>
  <button id="resetBtn">Reiniciar Partida</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chessground@8.0.0/dist/chessground.min.js"></script>

<script>
// Inicializar juego
const game = new Chess();
let movimientos = 0;

// Configurar tablero
const boardEl = document.getElementById("board");
const board = Chessground(boardEl, {
  orientation: 'white',
  movable: {
    free: false,
    color: 'white',
    events: {
      after: onMove
    }
  }
});

// Función al mover piezas
function onMove(orig, dest) {
  const move = game.move({from: orig, to: dest, promotion: 'q'});
  if(move === null) {
    board.set({fen: game.fen()});
    return;
  }
  movimientos++;
  updateStatus();
}

// Actualizar estado
function updateStatus() {
  let status = '';
  if(game.in_checkmate()) status = '¡Jaque mate! Fin de la partida.';
  else if(game.in_draw()) status = 'Empate.';
  else status = 'Juego en curso';
  
  document.getElementById('status').innerText = status;
  document.getElementById('turno').innerText = game.turn() === 'w' ? 'Turno: Blancas' : 'Turno: Negras';
  document.getElementById('movimientos').innerText = 'Movimientos: ' + movimientos;
}

// Reiniciar partida
document.getElementById('resetBtn').addEventListener('click', function(){
  game.reset();
  movimientos = 0;
  board.set({fen: game.fen(), turnColor: 'white'});
  updateStatus();
});

// Inicializar
board.set({fen: game.fen()});
updateStatus();
</script>

</body>
</html>
