<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ajedrez Profesional Deluxe</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">
<style>
body { background-color:#222; color:white; font-family:Arial,sans-serif; text-align:center; margin:0; padding:0;}
h1 { margin-top:20px;}
#board { width: 500px; margin: 20px auto; }
button { padding:8px 20px; font-size:16px; cursor:pointer; border:none; border-radius:5px; background-color:#555; color:white; margin-top:10px; }
button:hover { background-color:#777; }
#info { margin-top:15px; }
#status, #turno, #movimientos, #clock { margin:5px 0; font-weight:bold; }
</style>
</head>
<body>

<h1>Ajedrez Profesional Deluxe</h1>
<div id="board"></div>
<div id="info">
  <p id="status">Estado del juego: en curso</p>
  <p id="turno">Turno: Blancas</p>
  <p id="movimientos">Movimientos: 0</p>
  <p id="clock">Blancas: <span id="clockWhite">10:00</span> | Negras: <span id="clockBlack">10:00</span></p>
  <button id="resetBtn">Reiniciar Partida</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>
// Juego
var game = new Chess();
var movimientos = 0;
var clockWhite = 600; // 10 min
var clockBlack = 600;

// Tablero
var board = Chessboard('board', {
  draggable:true,
  position: game.fen(),
  onDrop: handleMove,
  onSnapEnd: function(){ board.position(game.fen()); },
  pieceTheme: 'https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/img/chesspieces/wikipedia/{piece}.png'
});

// Función al mover piezas
function handleMove(source,target){
  var move = game.move({from: source, to: target, promotion:'q'});
  if(move===null) return 'snapback';
  movimientos++;
  updateStatus();
  saveGame();
}

// Actualizar estado
function updateStatus(){
  var status='';
  if(game.in_checkmate()){ status='¡Jaque mate! Fin de la partida.'; }
  else if(game.in_draw()){ status='Empate.'; }
  else{ status='Juego en curso'; }
  document.getElementById('status').innerText=status;
  document.getElementById('turno').innerText= game.turn()==='w'?'Turno: Blancas':'Turno: Negras';
  document.getElementById('movimientos').innerText='Movimientos: '+movimientos;
}

// Guardar partida en localStorage
function saveGame(){
  localStorage.setItem('chessGame', game.fen());
  localStorage.setItem('chessMoves', movimientos);
  localStorage.setItem('clockWhite', clockWhite);
  localStorage.setItem('clockBlack', clockBlack);
}

// Reiniciar partida
document.getElementById('resetBtn').addEventListener('click',function(){
  game.reset();
  board.start();
  movimientos=0;
  clockWhite=600;
  clockBlack=600;
  localStorage.clear();
  updateStatus();
  updateClockDisplay();
});

// Función de reloj
function updateClockDisplay(){
  var minW = Math.floor(clockWhite/60), secW = clockWhite%60;
  var minB = Math.floor(clockBlack/60), secB = clockBlack%60;
  document.getElementById('clockWhite').innerText = minW.toString().padStart(2,'0')+':'+secW.toString().padStart(2,'0');
  document.getElementById('clockBlack').innerText = minB.toString().padStart(2,'0')+':'+secB.toString().padStart(2,'0');
}

// Intervalo de reloj
setInterval(function(){
  if(game.game_over()) return;
  if(game.turn()==='w'){ clockWhite--; if(clockWhite<0) clockWhite=0; }
  else{ clockBlack--; if(clockBlack<0) clockBlack=0; }
  updateClockDisplay();
  saveGame();
},1000);

// Inicializar
updateStatus();
updateClockDisplay();
</script>

</body>
</html>
