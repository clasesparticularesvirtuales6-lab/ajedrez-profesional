    auth.onAuthStateChanged(user => {
      if (user) {

        player = user.uid;
        document.getElementById("currentPlayer").innerText = user.email;
        showGame();

  // --- UI Helpers ---
  function showLogin(){
    console.log("-> Entrando en showLogin().");
    document.getElementById("login").style.display="block";
    document.getElementById("registro").style.display="none";
    document.getElementById("game").style.display="none";
    document.getElementById("msgLogin").innerText = ""; // Limpiar mensajes de error previos
  }
  function showRegistro(){
    document.getElementById("login").style.display="none";
    document.getElementById("registro").style.display="block";
    document.getElementById("msgReg").innerText = ""; // Limpiar mensajes de error previos
  }
  function showGame(){
    document.getElementById("login").style.display="none";
    document.getElementById("registro").style.display="none";
    document.getElementById("game").style.display="block";
  }

  // --- REGISTRO (¡Modularizado!) ---
  window.registrar = async function(){ // Hacer la función global para que onclick la encuentre
    let u = document.getElementById("regUser").value;
    let p = document.getElementById("regPass").value;
    document.getElementById("msgReg").innerText = ""; // Limpiar mensajes

    try{
      const userCredential = await createUserWithEmailAndPassword(auth, u, p); // Función modular
      const userId = userCredential.user.uid;
      // Usar setDoc para Firestore modular
      await setDoc(doc(db, "usuarios", userId), {email: u, victorias:0,derrotas:0,empates:0,ranking:0});
      alert("Usuario registrado. Ahora podés hacer login.");
      // if (analytics) logEvent(analytics, 'sign_up', { method: 'email_password' }); // Analytics modular
      showLogin();
    }catch(e){
      console.error("ERROR en registrar():", e.code, e.message);
      document.getElementById("msgReg").innerText = "Error: " + e.message;
    }
  }

  // --- LOGIN (CON LOGGING DETALLADO Y MANEJO DE ERRORES MEJORADO) ---
  window.login = async function(){ // Hacer la función global para que onclick la encuentre
    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;
    document.getElementById("msgLogin").innerText = ""; // Limpiar mensajes

    console.log("Inicio de login(): Intentando iniciar sesión para usuario:", u);

    try{
      const userCredential = await signInWithEmailAndPassword(auth, u, p); // Función modular
      console.log("Login exitoso. userCredential:", userCredential);

      player = userCredential.user.uid;
      console.log("UID del jugador almacenado:", player);

      document.getElementById("currentPlayer").innerText = userCredential.user.email;
      console.log("Email del jugador mostrado:", userCredential.user.email);

      // if (analytics) logEvent(analytics, 'login', { method: 'email_password' }); // Analytics modular

      showGame();
      console.log("Función showGame() llamada.");

      await cargarRanking();
      console.log("Función cargarRanking() llamada y completada.");

      setTimeout(() => {
        initChess();
        console.log("setTimeout para initChess() ejecutado.");
      }, 200);

    }catch(e){
      console.error("ERROR en la función login():", e.code, e.message);
      document.getElementById("msgLogin").innerText = "Error al iniciar sesión: " + e.message; // Mensaje de error visible
    }
  }

  // --- SALIR (Cerrar Sesión) ---
  window.salir = async function() {
    try {
      await signOut(auth); // Función modular para cerrar sesión
      console.log("Sesión cerrada correctamente.");
      player = ""; // Limpiar el UID del jugador
      showLogin(); // Mostrar la pantalla de login
      // location.reload(); // Opcional: recargar la página si es necesario
    } catch (e) {
      console.error("ERROR al cerrar sesión:", e.message);
      alert("Error al cerrar sesión: " + e.message);
    }
  }

  // --- CARGAR RANKING (Ejemplo con Firestore modular) ---
  window.cargarRanking = async function() {
    console.log("-> Cargando ranking...");
    const rankingDiv = document.getElementById("ranking");
    rankingDiv.innerHTML = "Cargando...";

    try {
      const q = query(collection(db, "usuarios"), orderBy("ranking", "desc")); // Consulta modular
      const querySnapshot = await getDocs(q); // Obtener documentos modular

      let rankingHTML = "<ul>";
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        rankingHTML += `<li>${data.email} - Ranking: ${data.ranking} (V:${data.victorias} D:${data.derrotas} E:${data.empates})</li>`;
      });
      rankingHTML += "</ul>";
      rankingDiv.innerHTML = rankingHTML;
      console.log("-> Ranking cargado exitosamente.");
    } catch (e) {
      console.error("ERROR al cargar el ranking:", e.message);
      rankingDiv.innerHTML = "Error al cargar el ranking.";
    }
  }

          events: {

          }
        },
        draggable: {

        }

      cg.set({ fen: game.fen() });
      updateStatus();
    } else {
      console.error("ERROR: No se encontró el elemento 'board' o Chessground no está cargado.");
    }
  }
